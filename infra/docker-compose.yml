services:
  postgres:
    image: postgres:16
    container_name: friendgroup-postgres
    environment:
      POSTGRES_USER: friendgroup
      POSTGRES_PASSWORD: friendgroup
      POSTGRES_DB: friendgroup_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U friendgroup -d friendgroup_dev"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: friendgroup-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: friendgroup-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  redis_data:
  minio_data:
